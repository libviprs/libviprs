name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo clippy --all-targets --features pdfium -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  integration-test:
    name: Integration Tests (libviprs-tests)
    runs-on: ubuntu-latest
    steps:
      # Check out libviprs at the current branch/PR ref into the "libviprs" subdirectory.
      # libviprs-tests depends on { path = "../libviprs" }, so the two repos must be siblings.
      - uses: actions/checkout@v4
        with:
          path: libviprs
      - uses: actions/checkout@v4
        with:
          repository: libviprs/libviprs-tests
          path: libviprs-tests
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: libviprs-tests
      - name: Run integration tests
        working-directory: libviprs-tests
        run: cargo test
